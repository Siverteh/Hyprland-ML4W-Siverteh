# -----------------------------------------------------
# Animations
# preset: minimal
# -----------------------------------------------------

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07

    animation = windows, 1, 2, md3_decel, popin 70%
    animation = windowsIn, 1, 2, md3_decel, popin 70%
    animation = windowsOut, 1, 2, md3_accel, popin 70%
    animation = border, 1, 6, default
    animation = fade, 1, 2, md3_decel
    animation = layersIn, 1, 2, menu_decel, slide
    animation = layersOut, 1, 1.2, menu_accel
    animation = fadeLayersIn, 1, 1.2, menu_decel
    animation = fadeLayersOut, 1, 2, menu_accel
    animation = workspaces, 1, 4, menu_decel, slide
    animation = specialWorkspace, 1, 2, md3_decel, slidevert
}
