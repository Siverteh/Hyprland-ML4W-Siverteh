# -----------------------------------------------------
# Animations
# preset: lively
# -----------------------------------------------------

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 4, overshot, popin 58%
    animation = windowsIn, 1, 4, overshot, popin 58%
    animation = windowsOut, 1, 4, md3_accel, popin 58%
    animation = border, 1, 14, default
    animation = fade, 1, 4, easeOutExpo
    animation = layersIn, 1, 4, menu_decel, slide
    animation = layersOut, 1, 2, menu_accel
    animation = fadeLayersIn, 1, 2.5, menu_decel
    animation = fadeLayersOut, 1, 5, menu_accel
    animation = workspaces, 1, 9, menu_decel, slide
    animation = specialWorkspace, 1, 4, overshot, slidevert
}
